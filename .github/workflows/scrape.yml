name: Daily Deal Scrape

on:
  schedule:
    # Runs every day at 7am UTC (2am EST) to catch fresh deals
    - cron: "0 7 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run scraper
        run: node scripts/scrape-deals.js

      - name: Commit updated deals
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/deals.json
          git diff --staged --quiet || git commit -m "Update daily deals [automated]"
          git push
